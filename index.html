<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CYBERPUNK: FaTaCi GAMES V7</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #0ff; height: 100vh; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; background: #050505; }
        canvas { width: 100%; height: 100%; display: block; }

        /* Her Yerde Görünür Coin */
        .coin-ui { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0,0,0,0.8); padding: 10px 15px; 
            border: 2px solid #ff0; border-radius: 15px;
            color: #ff0; font-weight: bold; z-index: 500;
        }

        /* Menü Tasarımları */
        .menu { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.95); display:none; flex-direction:column; 
            justify-content:center; align-items:center; z-index:100;
        }
        #splash { position: fixed; background:#000; z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%; height:100%; cursor: pointer; }
        .glitch { font-size: 50px; animation: glitch 0.3s infinite; text-shadow: 2px 2px #f0f; }
        @keyframes glitch { 0% {transform:translate(0)} 50% {transform:translate(-3px, 2px)} 100% {transform:translate(3px, -2px)} }

        /* Dev Market Çarşısı */
        .market-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px; width: 85%; max-height: 60vh; overflow-y: auto; padding: 15px;
            border: 1px solid #333; margin: 15px 0;
        }
        .market-item {
            border: 1px solid #444; padding: 10px; text-align: center;
            background: rgba(255,255,255,0.05); cursor: pointer;
        }
        .market-item.owned { border-color: #0f0; }
        .market-item.selected { border: 2px solid #0ff; background: rgba(0,255,255,0.2); }

        .btn { padding: 12px 35px; border: 2px solid #0ff; background:transparent; color:#0ff; font-family:'Orbitron'; font-weight:bold; cursor:pointer; margin: 10px; }
        .btn:hover { background: rgba(0,255,255,0.2); }
        
        .game-stats { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 50; }
        .health-bg { width: 150px; height: 10px; border: 1px solid #f0f; margin-top: 5px; }
        #hF { height: 100%; background: #f0f; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="coin-ui" id="coinWallet">🪙 0 CR</div>

        <div id="splash" onclick="startIntro()">
            <h1 class="glitch">FaTaCi GAMES</h1>
            <p style="color:#f0f; margin-top: 20px; letter-spacing: 3px;">SİSTEME BAĞLANMAK İÇİN TIKLA</p>
        </div>

        <div class="game-stats" id="uiBox" style="display:none;">
            <div id="sTxt">SKOR: 0</div>
            <div style="font-size:12px; color:#0f0;">LEVEL: <span id="lTxt">1</span></div>
            <div class="health-bg"><div id="hF"></div></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mainMenu" class="menu" style="display:flex;">
            <h1 style="color:#0ff; margin-bottom:20px;">SİBER KOMUTA</h1>
            <button class="btn" onclick="startGame()">GÖREVE BAŞLA</button>
            <button class="btn" onclick="showMenu('shopMenu')">SİYAH MARKET</button>
            <div style="margin-top:20px; color:#555;">REKOR: <span id="bestS">0</span></div>
        </div>

        <div id="shopMenu" class="menu">
            <h2 style="color:#ff0;">GEMİ KATALOĞU</h2>
            <div class="market-grid" id="marketGrid"></div>
            <button class="btn" onclick="showMenu('mainMenu')">MENÜYE DÖN</button>
        </div>

        <div id="overMenu" class="menu">
            <h1 style="color:#f00">BAĞLANTI KESİLDİ</h1>
            <div id="resTxt" style="margin:20px; text-align:center;"></div>
            <button class="btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false, score = 0, level = 1, lastTime = 0;
        
        let credits = parseInt(localStorage.getItem('fCr')) || 0;
        let bestS = parseInt(localStorage.getItem('fBs')) || 0;
        let owned = JSON.parse(localStorage.getItem('fOw')) || ['neon'];
        let currentShip = localStorage.getItem('fCu') || 'neon';

        const sfx = {
            shoot: new Audio('sesler/ates.wav'),
            boom: new Audio('sesler/patlama.wav'),
            bgm: new Audio('sesler/muzik.mp3')
        };
        sfx.bgm.loop = true; sfx.bgm.volume = 0.2;

        const ships = {
            neon: { name: "NEON", cost: 0, s: 10, hp: 100, c: "#0ff" },
            tank: { name: "TITAN", cost: 5000, s: 6, hp: 250, c: "#f0f" },
            phantom: { name: "GHOST", cost: 12000, s: 15, hp: 80, c: "#ff0" },
            crimson: { name: "VALKYRIE", cost: 20000, s: 12, hp: 140, c: "#f00" },
            emerald: { name: "ZÜMRÜT", cost: 35000, s: 11, hp: 200, c: "#0f0" },
            void: { name: "VOID", cost: 50000, s: 9, hp: 350, c: "#fff" },
            ruby: { name: "YAKUT", cost: 75000, s: 14, hp: 180, c: "#e0115f" },
            golden: { name: "GOLDEN", cost: 150000, s: 16, hp: 300, c: "#ffd700" }
        };

        const player = { x: 0, y: 0, h: 100, lastS: 0 };
        let enemies = [], bullets = [], stars = [];
        const eTypes = {
            d: {c:'#ff0040', h:1, s:3.5, sc:10, sz:22},
            h: {c:'#ff6600', h:3, s:4.5, sc:30, sz:28},
            t: {c:'#f0f', h:12, s:2.2, sc:70, sz:38},
            b: {c:'#0ff', h:50, s:1.5, sc:500, sz:80}
        };

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            player.x = canvas.width/2; player.y = canvas.height-100;
            stars = []; for(let i=0; i<80; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, sp:Math.random()*3+1});
        }
        window.addEventListener('resize', resize); resize();

        function updateCoinUI() {
            document.getElementById('coinWallet').innerText = "🪙 " + credits + " CR";
        }

        function startIntro() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                updateCoinUI();
                document.getElementById('bestS').innerText = bestS;
            }, 500);
        }

        // ATEŞ ETME (SPACE VE TIKLAMA)
        function shoot() {
            if(!gameRunning) return;
            let now = Date.now();
            if(now - player.lastS < 180) return;
            try { let s = sfx.shoot.cloneNode(); s.volume = 0.1; s.play(); } catch(e){}
            bullets.push({x: player.x, y: player.y - 30});
            player.lastS = now;
        }

        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if(e.code === 'Space') { e.preventDefault(); shoot(); }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        canvas.addEventListener('touchstart', e => { e.preventDefault(); shoot(); isT=true; tX=e.touches[0].clientX; tY=e.touches[0].clientY; });
        canvas.addEventListener('mousedown', () => shoot());

        let isT = false, tX = 0, tY = 0;
        canvas.addEventListener('touchmove', e => {
            if(!isT) return; e.preventDefault();
            player.x += (e.touches[0].clientX - tX); player.y += (e.touches[0].clientY - tY);
            tX = e.touches[0].clientX; tY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', () => isT=false);

        function showMenu(id) {
            document.querySelectorAll('.menu').forEach(m => m.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
            if(id === 'shopMenu') renderMarket();
            updateCoinUI();
        }

        function renderMarket() {
            const grid = document.getElementById('marketGrid');
            grid.innerHTML = '';
            for (let k in ships) {
                const s = ships[k];
                const isO = owned.includes(k);
                const isS = currentShip === k;
                grid.innerHTML += `
                    <div class="market-item ${isO ? 'owned' : ''} ${isS ? 'selected' : ''}" onclick="handleBuy('${k}')">
                        <div style="color:${s.c}; font-size:12px; font-weight:900;">${s.name}</div>
                        <div style="color:#ff0; font-size:10px; margin-top:5px;">${isO ? (isS ? 'AKTİF' : 'SEÇ') : s.cost + ' CR'}</div>
                    </div>
                `;
            }
        }

        function handleBuy(k) {
            const s = ships[k];
            if(owned.includes(k)) {
                currentShip = k;
                localStorage.setItem('fCu', k);
            } else if(credits >= s.cost) {
                credits -= s.cost;
                owned.push(k);
                currentShip = k;
                localStorage.setItem('fCr', credits);
                localStorage.setItem('fOw', JSON.stringify(owned));
                localStorage.setItem('fCu', k);
            }
            renderMarket();
            updateCoinUI();
        }

        function startGame() {
            showMenu('none');
            document.getElementById('uiBox').style.display = 'block';
            gameRunning = true;
            player.h = ships[currentShip].hp;
            document.getElementById('hF').style.width = '100%';
            sfx.bgm.play().catch(()=>{});
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop(ts) {
            if(!gameRunning) return;
            let dt = (ts - lastTime) / 1000; if(dt > 0.1) dt = 0.016; lastTime = ts;

            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,canvas.width, canvas.height);
            stars.forEach(st => { st.y += st.sp; if(st.y > canvas.height) st.y = 0; ctx.fillStyle='#fff'; ctx.fillRect(st.x, st.y, st.s, st.s); });

            // PC Hareket
            let sInfo = ships[currentShip];
            if(keys['w'] || keys['arrowup']) player.y -= sInfo.s;
            if(keys['s'] || keys['arrowdown']) player.y += sInfo.s;
            if(keys['a'] || keys['arrowleft']) player.x -= sInfo.s;
            if(keys['d'] || keys['arrowright']) player.x += sInfo.s;
            if(keys[' ']) shoot();
            
            player.x = Math.max(20, Math.min(canvas.width-20, player.x));
            player.y = Math.max(20, Math.min(canvas.height-20, player.y));

            // JET ÇİZİMİ (KESİN GÖRÜNÜRLÜK)
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.fillStyle = sInfo.c;
            ctx.shadowBlur = 20; ctx.shadowColor = sInfo.c;
            ctx.beginPath();
            ctx.moveTo(0, -25); ctx.lineTo(-20, 15); ctx.lineTo(20, 15);
            ctx.fill();
            ctx.restore();

            // Mermiler
            for(let i=bullets.length-1; i>=0; i--){
                bullets[i].y -= 12;
                ctx.fillStyle='#fff'; ctx.fillRect(bullets[i].x-2, bullets[i].y, 4, 15);
                if(bullets[i].y < -20) bullets.splice(i,1);
            }

            // Düşmanlar
            if(Math.random() < 0.045 + (level*0.005)){
                let tArr = Object.keys(eTypes);
                let t = tArr[Math.floor(Math.random()*(level > 3 ? 4 : 2))];
                let d = eTypes[t];
                enemies.push({...d, x: Math.random()*canvas.width, y:-60, ch: d.h, t: t});
            }

            for(let i=enemies.length-1; i>=0; i--){
                let en = enemies[i]; en.y += en.s;
                ctx.fillStyle = en.c;
                ctx.beginPath(); ctx.arc(en.x, en.y, en.sz/2, 0, Math.PI*2); ctx.fill();

                // Çarpışma
                if(Math.hypot(player.x-en.x, player.y-en.y) < en.sz/2+22){
                    player.h -= 20; sfx.boom.cloneNode().play().catch(()=>{}); enemies.splice(i,1);
                    document.getElementById('hF').style.width = (player.h/sInfo.hp*100)+'%';
                    if(player.h <= 0) {
                        gameRunning = false; showMenu('overMenu');
                        document.getElementById('resTxt').innerHTML = "SKOR: "+score+"<br>KAZANILAN: "+Math.floor(score/4)+" CR";
                        credits += Math.floor(score/4); localStorage.setItem('fCr', credits);
                        if(score > bestS) { bestS = score; localStorage.setItem('fBs', score); }
                    }
                    continue;
                }

                bullets.forEach((b, bi) => {
                    if(Math.hypot(b.x-en.x, b.y-en.y) < en.sz/2+10){
                        en.ch--; bullets.splice(bi,1);
                        if(en.ch <= 0){
                            score += en.sc; sfx.boom.cloneNode().play().catch(()=>{});
                            enemies.splice(i,1);
                            if(score > level*1000) level++;
                        }
                    }
                });
                if(en.y > canvas.height+100) enemies.splice(i,1);
            }

            document.getElementById('sTxt').innerText = "SKOR: " + score;
            document.getElementById('lTxt').innerText = level;
            updateCoinUI();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
