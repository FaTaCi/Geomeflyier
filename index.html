<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CYBERPUNK: FaTaCi GAMES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #0ff; height: 100vh; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; background: #050505; }
        canvas { width: 100%; height: 100%; display: block; }
        .ui { position: absolute; pointer-events: none; text-shadow: 0 0 10px #0ff; z-index: 10; }
        
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; transition: 1s; cursor: pointer; text-align: center; }
        .glitch { font-size: 45px; animation: glitch-anim 0.3s infinite; text-shadow: 2px 2px #f0f; }
        @keyframes glitch-anim { 0% {transform:translate(0)} 50% {transform:translate(-3px, 2px)} 100% {transform:translate(3px, -2px)} }

        .menu { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:100; pointer-events: auto; }
        .btn { padding: 12px 30px; border: 2px solid #0ff; background:transparent; color:#0ff; font-family:'Orbitron'; font-weight:bold; cursor:pointer; margin: 8px; width: 220px; }
        
        .p-indicators { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .p-bar { width: 40px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 5px; opacity: 0; }
        .p-fill { height: 100%; width: 0%; transition: 0.1s linear; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="splash" onclick="startIntro()">
            <h1 class="glitch">FaTaCi GAMES</h1>
            <p id="splashTxt" style="color:#f0f; margin-top: 20px; letter-spacing: 2px;">SİSTEMİ YÜKLEMEK İÇİN TIKLA</p>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div class="ui" style="top:20px; left:20px;">
            <div id="sD">SKOR: 0</div>
            <div id="cD" style="color:#ff0">KREDİ: 0</div>
            <div id="lD" style="color:#0f0; font-size:12px;">LEVEL: 1</div>
        </div>

        <div id="healthBar" class="ui" style="top:20px; right:20px; width:100px; height:12px; border:1px solid #f0f;">
            <div id="hF" style="width:100%; height:100%; background:#f0f; transition:0.3s;"></div>
        </div>

        <div class="p-indicators ui">
            <div id="sI" style="opacity:0.2">🛡️<div class="p-bar" id="sB"><div id="sF" class="p-fill" style="background:#0f0"></div></div></div>
            <div id="rI" style="opacity:0.2">⚡<div class="p-bar" id="rB"><div id="rF" class="p-fill" style="background:#f0f"></div></div></div>
            <div id="mI" style="opacity:0.2">🔥<div class="p-bar" id="mB"><div id="mF" class="p-fill" style="background:#ff0"></div></div></div>
        </div>

        <div id="mainMenu" class="menu">
            <h1>NEON RUNNER</h1>
            <button class="btn" onclick="startGame()">GÖREVE BAŞLA</button>
            <button class="btn" onclick="showMenu('shopMenu')">MARKET</button>
            <div style="margin-top:20px; color:#ff0;">REKOR: <span id="bestS">0</span></div>
        </div>

        <div id="shopMenu" class="menu">
            <h1>CYBER MARKET</h1>
            <div style="display:flex; gap:10px; margin:20px;">
                <div id="i-neon" style="border:1px solid #0ff; padding:10px; cursor:pointer;" onclick="selectShip('neon')">NEON RUNNER</div>
                <div id="i-tank" style="border:1px solid #f0f; padding:10px; cursor:pointer;" onclick="buyShip('tank', 5000)">TITAN TANK</div>
            </div>
            <button class="btn" onclick="showMenu('mainMenu')">GERİ</button>
        </div>

        <div id="pauseMenu" class="menu">
            <h1>DURAKLATILDI</h1>
            <button class="btn" onclick="togglePause()">DEVAM ET</button>
            <button class="btn" onclick="location.reload()">ANA MENÜ</button>
        </div>

        <div id="overMenu" class="menu">
            <h1 style="color:#f00">GÖREV BAŞARISIZ</h1>
            <div id="finalScore" style="margin:20px;"></div>
            <button class="btn" onclick="location.reload()">TEKRAR DENE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false, gamePaused = false, score = 0, level = 1, lastTime = 0;
        let credits = parseInt(localStorage.getItem('fCredits')) || 0;
        let bestScore = parseInt(localStorage.getItem('fBest')) || 0;
        let owned = JSON.parse(localStorage.getItem('fShips')) || ['neon'];
        let currentShip = 'neon';
        const keys = {};

        // SESLER (Hata vermemesi için güvenli yüklendi)
        const sfx = {
            intro: new Audio('sesler/giris-efekti.mp3'),
            bgm: new Audio('sesler/muzik.mp3'),
            shoot: new Audio('sesler/ates.wav'),
            boom: new Audio('sesler/patlama.wav'),
            power: new Audio('sesler/ozel-guc.wav')
        };
        sfx.bgm.loop = true; sfx.bgm.volume = 0.15;

        const player = { x: 0, y: 0, h: 100, s: false, r: false, m: false, timers: {s:0, r:0, m:0}, lastS: 0 };
        let enemies = [], bullets = [], stars = [], powerups = [];
        const types = { 
            drone: {c:'#ff0040', h:1, s:3.5, sc:10, sz:22}, 
            hunter: {c:'#ff6600', h:3, s:4.5, sc:25, sz:28}, 
            tank: {c:'#f0f', h:10, s:2.5, sc:60, sz:38}, 
            boss: {c:'#0ff', h:50, s:1.5, sc:500, sz:75} 
        };

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            player.x = canvas.width/2; player.y = canvas.height-100;
            stars = []; for(let i=0; i<80; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, sp:Math.random()*3+1});
        }
        window.addEventListener('resize', resize); resize();

        function startIntro() {
            document.getElementById('splashTxt').innerText = "SİSTEM BAĞLANIYOR...";
            try { sfx.intro.play(); } catch(e){}
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    showMenu('mainMenu');
                    document.getElementById('bestS').innerText = bestScore;
                }, 1000);
            }, 2000);
        }

        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(e.key.toLowerCase()==='p' && gameRunning) togglePause(); });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        
        let isT = false, tX = 0, tY = 0;
        canvas.addEventListener('touchstart', e => { isT=true; tX=e.touches[0].clientX; tY=e.touches[0].clientY; if(gameRunning && !gamePaused) shoot(); });
        canvas.addEventListener('touchmove', e => {
            if(!isT || gamePaused) return; e.preventDefault();
            player.x += (e.touches[0].clientX - tX); player.y += (e.touches[0].clientY - tY);
            tX = e.touches[0].clientX; tY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', () => isT=false);

        function showMenu(id) {
            document.querySelectorAll('.menu').forEach(m => m.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
        }

        function startGame() {
            showMenu('none'); gameRunning = true; 
            try { sfx.bgm.play(); } catch(e){}
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function togglePause() {
            gamePaused = !gamePaused;
            document.getElementById('pauseMenu').style.display = gamePaused ? 'flex' : 'none';
            if(!gamePaused) { lastTime = performance.now(); requestAnimationFrame(gameLoop); }
        }

        function selectShip(t) { if(owned.includes(t)) currentShip = t; }
        function buyShip(t, c) { if(credits >= c && !owned.includes(t)) { credits -= c; owned.push(t); localStorage.setItem('fCredits', credits); selectShip(t); } }

        function shoot() {
            let now = Date.now(), rate = player.r ? 100 : 250;
            if(now - player.lastS < rate) return;
            try { let s = sfx.shoot.cloneNode(); s.volume = 0.1; s.play(); } catch(e){}
            if(player.m) {
                bullets.push({x:player.x, y:player.y-20, vx:0, vy:-12}, {x:player.x-15, y:player.y-10, vx:-3, vy:-11}, {x:player.x+15, y:player.y-10, vx:3, vy:-11});
            } else { bullets.push({x:player.x, y:player.y-20, vx:0, vy:-12}); }
            player.lastS = now;
        }

        function gameLoop(ts) {
            if(!gameRunning || gamePaused) return;
            let dt = (ts - lastTime) / 1000; 
            if (dt > 0.1 || dt <= 0) dt = 0.016;
            lastTime = ts;

            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,canvas.width, canvas.height);
            stars.forEach(s => { s.y += s.sp; if(s.y > canvas.height) s.y = 0; ctx.fillStyle='#fff'; ctx.fillRect(s.x, s.y, s.s, s.s); });

            let speed = currentShip === 'tank' ? 6 : 11;
            if(keys['w'] || keys['arrowup']) player.y -= speed;
            if(keys['s'] || keys['arrowdown']) player.y += speed;
            if(keys['a'] || keys['arrowleft']) player.x -= speed;
            if(keys['d'] || keys['arrowright']) player.x += speed;
            if(keys[' '] || isT) shoot();
            player.x = Math.max(20, Math.min(canvas.width-20, player.x));
            player.y = Math.max(20, Math.min(canvas.height-20, player.y));

            // Powerup Timers
            ['s','r','m'].forEach(k => {
                if(player.timers[k] > 0) {
                    player.timers[k] -= dt;
                    document.getElementById(k+'I').style.opacity = 1;
                    document.getElementById(k+'B').style.opacity = 1;
                    document.getElementById(k+'F').style.width = (player.timers[k]/10*100)+'%';
                    if(player.timers[k] <= 0) { player[k==='s'?'s':k==='r'?'r':'m'] = false; document.getElementById(k+'I').style.opacity = 0.2; document.getElementById(k+'B').style.opacity = 0; }
                }
            });

            // Gemi Çizimi
            if(player.s) { ctx.beginPath(); ctx.arc(player.x, player.y, 42, 0, Math.PI*2); ctx.strokeStyle='#0f0'; ctx.lineWidth=2; ctx.stroke(); }
            ctx.fillStyle = currentShip === 'tank' ? '#f0f' : '#0ff';
            ctx.beginPath(); ctx.moveTo(player.x, player.y-25); ctx.lineTo(player.x-20, player.y+15); ctx.lineTo(player.x+20, player.y+15); ctx.fill();

            // Mermiler
            bullets.forEach((b,i) => { b.x += b.vx; b.y += b.vy; ctx.fillStyle='#fff'; ctx.fillRect(b.x-2, b.y, 4, 12); if(b.y < 0) bullets.splice(i,1); });

            // Düşman Spawning
            if(Math.random() < 0.04 + (level * 0.005)) {
                let pool = ['drone'];
                if(level >= 2) pool.push('hunter'); if(level >= 3) pool.push('tank');
                let t = pool[Math.floor(Math.random()*pool.length)];
                if(level >= 4 && score % 1000 < 100 && !enemies.some(e=>e.t==='boss') && Math.random() < 0.1) t = 'boss';
                let d = types[t]; 
                if(d) enemies.push({...d, x: Math.random()*canvas.width, y: -60, ch: d.h, maxH: d.h, t: t});
            }

            // HATA KORUMALI DÜŞMAN DÖNGÜSÜ
            for (let i = enemies.length - 1; i >= 0; i--) {
                let en = enemies[i];
                if(!en || !en.sz) { enemies.splice(i,1); continue; }
                
                en.y += en.s;
                ctx.save(); ctx.translate(en.x, en.y);
                ctx.fillStyle = en.c;
                ctx.beginPath();
                let sz = en.sz;
                if(en.t==='drone') { ctx.moveTo(0,-sz/2); ctx.lineTo(sz/2,sz/2); ctx.lineTo(-sz/2,sz/2); }
                else if(en.t==='hunter') ctx.rect(-sz/2, -sz/2, sz, sz);
                else if(en.t==='tank') ctx.arc(0,0,sz/2, 0, Math.PI*2);
                else if(en.t==='boss') { for(let j=0;j<6;j++) ctx.lineTo(Math.cos(j/6*Math.PI*2)*sz/2, Math.sin(j/6*Math.PI*2)*sz/2); }
                ctx.fill();
                
                // Can Barı (HATA BURADA DÜZELTİLDİ: types lookup yerine en.maxH kullanıldı)
                ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-sz/2, -sz/2-15, sz, 6);
                ctx.fillStyle='#0f0'; 
                ctx.fillRect(-sz/2, -sz/2-15, sz * (en.ch / en.maxH), 6);
                ctx.restore();

                // Çarpışma: Gemi
                if(Math.hypot(player.x-en.x, player.y-en.y) < sz/2+25) {
                    if(!player.s) player.h -= 25;
                    try { sfx.boom.cloneNode().play(); } catch(e){}
                    enemies.splice(i,1);
                    document.getElementById('hF').style.width = player.h+'%';
                    if(player.h <= 0) gameOver();
                    continue;
                }

                // Çarpışma: Mermiler
                for (let bi = bullets.length - 1; bi >= 0; bi--) {
                    let b = bullets[bi];
                    if(Math.hypot(b.x-en.x, b.y-en.y) < sz/2+10) {
                        en.ch--; bullets.splice(bi,1);
                        if(en.ch <= 0) {
                            try { sfx.boom.cloneNode().play(); } catch(e){}
                            score += en.sc; credits += Math.floor(en.sc/4);
                            if(Math.random() < 0.15) powerups.push({x:en.x, y:en.y, t:['s','r','m'][Math.floor(Math.random()*3)]});
                            if(score > level * 800) level++;
                            enemies.splice(i,1);
                            break;
                        }
                    }
                }
                if(en && en.y > canvas.height + 100) enemies.splice(i,1);
            }

            powerups.forEach((p, i) => {
                p.y += 3; ctx.font='25px Arial'; ctx.fillText(p.t==='s'?'🛡️':p.t==='r'?'⚡':'🔥', p.x, p.y);
                if(Math.hypot(player.x-p.x, player.y-p.y) < 40) {
                    try { sfx.power.cloneNode().play(); } catch(e){}
                    player[p.t==='s'?'s':p.t==='r'?'r':'m'] = true; player.timers[p.t] = 10;
                    powerups.splice(i,1);
                }
            });

            document.getElementById('sD').innerText = "SKOR: " + score;
            document.getElementById('cD').innerText = "KREDİ: " + credits;
            document.getElementById('lD').innerText = "LEVEL: " + level;
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            if(score > bestScore) { bestScore = score; localStorage.setItem('fBest', bestScore); }
            localStorage.setItem('fCredits', credits);
            document.getElementById('finalScore').innerText = "SKOR: " + score + "\nREKOR: " + bestScore;
            showMenu('overMenu');
        }
    </script>
</body>
</html>
