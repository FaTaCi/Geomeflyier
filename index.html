<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CYBERPUNK: FaTaCi GAMES TITAN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #0ff; height: 100vh; }
        
        #gameContainer { 
            position: relative; width: 100vw; height: 100vh; 
            background: #050505; 
            transition: background 3s ease; /* Arka plan renk geçişi */
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* ÜST UI VE COIN BÖLÜMÜ */
        .top-bar { 
            position: absolute; top: 15px; left: 15px; right: 15px; 
            display: flex; justify-content: space-between; align-items: flex-start;
            pointer-events: none; z-index: 20;
        }
        .stats-box { background: rgba(0,255,255,0.1); padding: 10px; border-left: 3px solid #0ff; }
        .coin-display { color: #ff0; font-weight: 900; text-shadow: 0 0 10px #ff0; font-size: 18px; }

        /* GİRİŞ VE MENÜLER */
        .menu { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); display:none; flex-direction:column; 
            justify-content:center; align-items:center; z-index:100; pointer-events: auto;
        }
        #splash { position: fixed; background:#000; z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%; height:100%; cursor: pointer; transition: 1s; }
        .glitch { font-size: 45px; animation: glitch-anim 0.3s infinite; text-shadow: 2px 2px #f0f; text-align: center; }
        @keyframes glitch-anim { 0% {transform:translate(0)} 50% {transform:translate(-3px, 2px)} 100% {transform:translate(3px, -2px)} }

        /* KATALOG / MARKET TASARIMI */
        .catalog-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            margin: 20px; max-width: 90vw; max-height: 60vh; overflow-y: auto; padding: 10px;
        }
        .ship-card { 
            border: 1px solid #f0f; padding: 15px; text-align: center; 
            background: rgba(255,0,255,0.05); cursor: pointer; transition: 0.3s;
        }
        .ship-card.owned { border-color: #0f0; color: #0f0; }
        .ship-card.selected { border: 2px solid #0ff; background: rgba(0,255,255,0.2); box-shadow: 0 0 15px #0ff; }
        
        .btn { padding: 12px 30px; border: 2px solid #0ff; background:transparent; color:#0ff; font-family:'Orbitron'; font-weight:bold; cursor:pointer; margin: 10px; width: 220px; }
        .btn:hover { background:rgba(0,255,255,0.2); }

        .health-bar { width: 120px; height: 10px; border: 1px solid #f0f; margin-top: 5px; }
        #hFill { background: #f0f; height: 100%; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="splash" onclick="startIntro()">
            <h1 class="glitch">FaTaCi GAMES</h1>
            <p style="color:#f0f; margin-top:20px;">SİSTEME BAĞLANMAK İÇİN TIKLA</p>
        </div>

        <div class="top-bar">
            <div class="stats-box">
                <div id="scoreTxt">SKOR: 0</div>
                <div class="coin-display" id="coinTxt">🪙 0 CR</div>
                <div style="color:#0f0; font-size:12px;">LEVEL: <span id="lvlTxt">1</span></div>
            </div>
            <div style="text-align:right;">
                <div style="font-size:12px;">ZIRH</div>
                <div class="health-bar"><div id="hFill"></div></div>
                <div style="font-size:10px; margin-top:5px; color:#ff0;">DURAKLAT: 'P'</div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mainMenu" class="menu" style="display:flex;">
            <h1 style="color:#0ff; margin-bottom:20px;">NEON RUNNER V5</h1>
            <button class="btn" onclick="startGame()">GÖREVE BAŞLA</button>
            <button class="btn" onclick="showMenu('shopMenu')">GEMİ KATALOĞU</button>
            <div style="margin-top:20px; color:#ff0;">EN YÜKSEK REKOR: <span id="bestS">0</span></div>
        </div>

        <div id="shopMenu" class="menu">
            <h2>SİBER KATALOG</h2>
            <div class="catalog-grid" id="catalogGrid"></div>
            <button class="btn" onclick="showMenu('mainMenu')">ANA MENÜYE DÖN</button>
        </div>

        <div id="pauseMenu" class="menu">
            <h1>SİSTEM DURDURULDU</h1>
            <button class="btn" onclick="togglePause()">DEVAM ET</button>
            <button class="btn" onclick="location.reload()">ÇIKIŞ YAP</button>
        </div>

        <div id="overMenu" class="menu">
            <h1 style="color:#f00">BAĞLANTI KESİLDİ</h1>
            <div id="finalRes" style="margin:20px; text-align:center;"></div>
            <button class="btn" onclick="location.reload()">YENİDEN BAĞLAN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false, gamePaused = false, score = 0, level = 1, lastTime = 0;
        
        // Veri Kaydı
        let credits = parseInt(localStorage.getItem('fCredits')) || 0;
        let bestScore = parseInt(localStorage.getItem('fBest')) || 0;
        let ownedShips = JSON.parse(localStorage.getItem('fShips')) || ['neon'];
        let currentShipKey = localStorage.getItem('fCurrentShip') || 'neon';
        
        const keys = {};

        // Sesler
        const sfx = {
            intro: new Audio('sesler/giris-efekti.mp3'),
            bgm: new Audio('sesler/muzik.mp3'),
            shoot: new Audio('sesler/ates.wav'),
            boom: new Audio('sesler/patlama.wav')
        };
        sfx.bgm.loop = true; sfx.bgm.volume = 0.15;

        // GEMİ KATALOĞU VERİLERİ
        const ships = {
            neon: { name: "NEON RUNNER", cost: 0, speed: 10, health: 100, color: "#0ff", desc: "Çevik & Standart" },
            tank: { name: "TITAN TANK", cost: 5000, speed: 6, health: 250, color: "#f0f", desc: "Ağır Zırhlı Dev" },
            phantom: { name: "SHADOW PHANTOM", cost: 12000, speed: 15, health: 70, color: "#ff0", desc: "Hızlı Suikastçı" },
            void: { name: "VOID BOMBER", cost: 25000, speed: 8, health: 150, color: "#0f0", desc: "Yıkıcı Güç" }
        };

        const player = { x: 0, y: 0, h: 100, lastS: 0 };
        let enemies = [], bullets = [], stars = [];
        const enemyTypes = { 
            drone: {c:'#ff0040', h:1, s:3.5, sc:10, sz:22}, 
            hunter: {c:'#ff6600', h:3, s:4.5, sc:30, sz:28}, 
            tank: {c:'#f0f', h:12, s:2.2, sc:70, sz:38}, 
            boss: {c:'#0ff', h:50, s:1.5, sc:500, sz:80} 
        };

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            player.x = canvas.width/2; player.y = canvas.height-100;
            stars = []; for(let i=0; i<80; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, sp:Math.random()*3+1});
        }
        window.addEventListener('resize', resize); resize();

        function startIntro() {
            try { sfx.intro.play(); } catch(e){}
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    showMenu('mainMenu');
                    document.getElementById('bestS').innerText = bestScore;
                    document.getElementById('coinTxt').innerText = "🪙 " + credits + " CR";
                }, 1000);
            }, 1500);
        }

        // KONTROLLER (PC & MOBİL)
        window.addEventListener('keydown', e => { 
            keys[e.key.toLowerCase()] = true; 
            if(e.key.toLowerCase()==='p' && gameRunning) togglePause();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        
        // Ateş Etme (Tıklama ve Space)
        window.addEventListener('mousedown', () => { if(gameRunning && !gamePaused) shoot(); });
        
        let isT = false, tX = 0, tY = 0;
        canvas.addEventListener('touchstart', e => { isT=true; tX=e.touches[0].clientX; tY=e.touches[0].clientY; if(gameRunning && !gamePaused) shoot(); });
        canvas.addEventListener('touchmove', e => {
            if(!isT || gamePaused) return; e.preventDefault();
            player.x += (e.touches[0].clientX - tX); player.y += (e.touches[0].clientY - tY);
            tX = e.touches[0].clientX; tY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', () => isT=false);

        function showMenu(id) {
            document.querySelectorAll('.menu').forEach(m => m.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
            if(id === 'shopMenu') renderCatalog();
        }

        // KATALOG VE SATIN ALMA MANTIĞI
        function renderCatalog() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';
            for (let key in ships) {
                const s = ships[key];
                const isOwned = ownedShips.includes(key);
                const isSelected = currentShipKey === key;
                grid.innerHTML += `
                    <div class="ship-card ${isOwned ? 'owned' : ''} ${isSelected ? 'selected' : ''}" onclick="handlePurchase('${key}')">
                        <div style="color:${s.color}; font-weight:bold;">${s.name}</div>
                        <div style="font-size:10px; margin:5px 0;">${s.desc}</div>
                        <div style="font-size:12px;">${isOwned ? (isSelected ? 'KUŞANILDI' : 'SEÇ') : s.cost + ' CR'}</div>
                    </div>
                `;
            }
            document.getElementById('coinTxt').innerText = "🪙 " + credits + " CR";
        }

        function handlePurchase(key) {
            const s = ships[key];
            if (ownedShips.includes(key)) {
                currentShipKey = key;
                localStorage.setItem('fCurrentShip', key);
            } else if (credits >= s.cost) {
                credits -= s.cost; // PARA EKSİLİR
                ownedShips.push(key);
                currentShipKey = key;
                localStorage.setItem('fCredits', credits);
                localStorage.setItem('fShips', JSON.stringify(ownedShips));
                localStorage.setItem('fCurrentShip', key);
            } else {
                alert("Yetersiz Kredi!");
            }
            renderCatalog();
        }

        function startGame() {
            showMenu('none'); gameRunning = true; 
            player.h = ships[currentShipKey].health;
            document.getElementById('hFill').style.width = '100%';
            try { sfx.bgm.play(); } catch(e){}
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function togglePause() {
            gamePaused = !gamePaused;
            document.getElementById('pauseMenu').style.display = gamePaused ? 'flex' : 'none';
            if(!gamePaused) { lastTime = performance.now(); requestAnimationFrame(gameLoop); }
        }

        function shoot() {
            let now = Date.now();
            if(now - player.lastS < 250) return;
            try { let s = sfx.shoot.cloneNode(); s.volume = 0.1; s.play(); } catch(e){}
            bullets.push({x:player.x, y:player.y-25, vx:0, vy:-12});
            player.lastS = now;
        }

        function gameLoop(ts) {
            if(!gameRunning || gamePaused) return;
            let dt = (ts - lastTime) / 1000; if(dt > 0.1) dt = 0.016; lastTime = ts;

            // DİNAMİK ARKA PLAN (Cyberpunk renk geçişleri)
            const colorPhase = Math.sin(Date.now() / 2000) * 10;
            document.getElementById('gameContainer').style.background = `radial-gradient(circle, rgb(5, ${5 + colorPhase}, ${10 + colorPhase}) 0%, #000 100%)`;

            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,canvas.width, canvas.height);
            stars.forEach(s => { s.y += s.sp; if(s.y > canvas.height) s.y = 0; ctx.fillStyle='#fff'; ctx.fillRect(s.x, s.y, s.s, s.s); });

            // PC HAREKET (Ateş etme PC'de space tuşuna bağlandı)
            let sInfo = ships[currentShipKey];
            if(keys['w'] || keys['arrowup']) player.y -= sInfo.speed;
            if(keys['s'] || keys['arrowdown']) player.y += sInfo.speed;
            if(keys['a'] || keys['arrowleft']) player.x -= sInfo.speed;
            if(keys['d'] || keys['arrowright']) player.x += sInfo.speed;
            if(keys[' ']) shoot(); // PC'de boşluk tuşu ateş eder

            player.x = Math.max(20, Math.min(canvas.width-20, player.x));
            player.y = Math.max(20, Math.min(canvas.height-20, player.y));

            // Gemi Çizimi (Rengi Marketten Seçilene Göre Değişir)
            ctx.fillStyle = sInfo.color;
            ctx.shadowBlur = 15; ctx.shadowColor = sInfo.color;
            ctx.beginPath(); ctx.moveTo(player.x, player.y-25); ctx.lineTo(player.x-20, player.y+15); ctx.lineTo(player.x+20, player.y+15); ctx.fill();
            ctx.shadowBlur = 0;

            // Mermiler
            for(let i=bullets.length-1; i>=0; i--){
                let b = bullets[i]; b.y += b.vy;
                ctx.fillStyle='#fff'; ctx.fillRect(b.x-2, b.y, 4, 12);
                if(b.y < -20) bullets.splice(i,1);
            }

            // Düşman Üretimi
            if(Math.random() < 0.04 + (level * 0.006)) {
                let pool = ['drone']; if(level>=2) pool.push('hunter'); if(level>=3) pool.push('tank');
                let t = pool[Math.floor(Math.random()*pool.length)];
                if(score > 1000 && score % 2000 < 100 && !enemies.some(e=>e.t==='boss')) t = 'boss';
                let d = enemyTypes[t];
                if(d) enemies.push({...d, x: Math.random()*(canvas.width-40)+20, y: -60, ch: d.h, maxH: d.h, t: t});
            }

            // Düşman Çarpışma ve Hareket
            for (let i = enemies.length - 1; i >= 0; i--) {
                let en = enemies[i]; en.y += en.s;
                ctx.fillStyle = en.c;
                ctx.beginPath();
                if(en.t==='drone') { ctx.moveTo(en.x, en.y-11); ctx.lineTo(en.x+11, en.y+11); ctx.lineTo(en.x-11, en.y+11); }
                else { ctx.arc(en.x, en.y, en.sz/2, 0, Math.PI*2); }
                ctx.fill();

                // Çarpışma: Gemi
                if(Math.hypot(player.x-en.x, player.y-en.y) < en.sz/2+20) {
                    player.h -= 25; sfx.boom.cloneNode().play(); enemies.splice(i,1);
                    document.getElementById('hFill').style.width = (player.h/sInfo.health*100)+'%';
                    if(player.h <= 0) gameOver();
                    continue;
                }

                // Çarpışma: Mermi
                bullets.forEach((b, bi) => {
                    if(Math.hypot(b.x-en.x, b.y-en.y) < en.sz/2+10) {
                        en.ch--; bullets.splice(bi,1);
                        if(en.ch <= 0) {
                            try { sfx.boom.cloneNode().play(); } catch(e){}
                            score += en.sc; credits += Math.floor(en.sc/5);
                            if(score > level * 1000) level++;
                            enemies.splice(i,1);
                        }
                    }
                });
                if(en && en.y > canvas.height + 100) enemies.splice(i,1);
            }

            document.getElementById('scoreTxt').innerText = "SKOR: " + score;
            document.getElementById('coinTxt').innerText = "🪙 " + credits + " CR";
            document.getElementById('lvlTxt').innerText = level;
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false; 
            if(score > bestScore) localStorage.setItem('fBest', score);
            localStorage.setItem('fCredits', credits);
            document.getElementById('finalRes').innerHTML = `SKOR: ${score}<br>KAZANILAN KREDİ: ${Math.floor(score/5)} CR`;
            showMenu('overMenu');
        }
    </script>
</body>
</html>
