<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CYBERPUNK: FaTaCi GAMES</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; height: 100vh; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; }
        canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
        .ui { position: absolute; color: #0ff; pointer-events: none; text-shadow: 0 0 10px #0ff; z-index: 10; }
        
        /* GİRİŞ EKRANI (Splash) */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; transition: opacity 1s; }
        .glitch-text { font-size: 50px; color: #0ff; text-shadow: 2px 2px #f0f; animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 50% { transform: translate(-3px, 2px); } 100% { transform: translate(3px, -2px); } }

        /* MENÜLER */
        .menu { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:100; }
        .btn { padding: 15px 40px; border: 2px solid #0ff; background: transparent; color: #0ff; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin: 10px; transition: 0.3s; }
        .btn:hover { background: rgba(0,255,255,0.2); box-shadow: 0 0 20px #0ff; }
        
        /* MARKET */
        .shop-items { display: flex; gap: 20px; margin: 20px; }
        .item { border: 1px solid #f0f; padding: 15px; text-align: center; color: #f0f; }
        .active-ship { border: 2px solid #0f0; color: #0f0; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="splash">
            <h1 class="glitch-text">FaTaCi GAMES</h1>
            <p style="color:#f0f; letter-spacing: 5px;">INITIALIZING...</p>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="scoreDisplay" class="ui" style="top:20px; left:20px;">SKOR: 0</div>
        <div id="creditDisplay" class="ui" style="top:50px; left:20px; color:#ff0;">KREDİ: 0</div>
        <div id="pauseBtn" class="ui" style="top:20px; right:20px; pointer-events:auto; cursor:pointer;" onclick="togglePause()">⏸ DURAKLAT (P)</div>

        <div id="pauseMenu" class="menu">
            <h1>SİSTEM DURDURULDU</h1>
            <button class="btn" onclick="togglePause()">DEVAM ET</button>
            <button class="btn" onclick="openShop()">MARKET</button>
        </div>

        <div id="shopMenu" class="menu">
            <h1>CYBER MARKET</h1>
            <div class="shop-items">
                <div class="item" id="ship-neon" onclick="selectShip('neon')">NEON RUNNER<br><small>HIZLI</small></div>
                <div class="item" id="ship-tank" onclick="buyShip('tank', 5000)">TITAN TANK<br><small>5000 KR</small></div>
            </div>
            <button class="btn" onclick="closeShop()">KAPAT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false, gamePaused = false, score = 0;
        let credits = parseInt(localStorage.getItem('fataciCredits')) || 0;
        let ownedShips = JSON.parse(localStorage.getItem('fataciShips')) || ['neon'];
        let currentShip = 'neon';

        // --- SESLER (Senin dosyalarına göre) ---
        const sfx = {
            intro: new Audio('sesler/giris-efekti.mp3'),
            bgm: new Audio('sesler/muzik.mp3'),
            shoot: new Audio('sesler/ates.wav'),
            boom: new Audio('sesler/patlama.wav'),
            power: new Audio('sesler/ozel-guc.wav')
        };
        sfx.bgm.loop = true; sfx.bgm.volume = 0.2;

        // Giriş Ekranı Mantığı
        window.onload = () => {
            sfx.intro.play().catch(()=>{});
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    gameRunning = true;
                    sfx.bgm.play();
                    requestAnimationFrame(gameLoop);
                }, 1000);
            }, 3000);
        };

        function togglePause() {
            gamePaused = !gamePaused;
            document.getElementById('pauseMenu').style.display = gamePaused ? 'flex' : 'none';
            if(!gamePaused) requestAnimationFrame(gameLoop);
        }

        // Market Fonksiyonları
        function openShop() {
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('shopMenu').style.display = 'flex';
            updateShopUI();
        }
        function closeShop() {
            document.getElementById('shopMenu').style.display = 'none';
            document.getElementById('pauseMenu').style.display = 'flex';
        }
        function buyShip(type, cost) {
            if(credits >= cost && !ownedShips.includes(type)) {
                credits -= cost;
                ownedShips.push(type);
                localStorage.setItem('fataciCredits', credits);
                localStorage.setItem('fataciShips', JSON.stringify(ownedShips));
                selectShip(type);
            } else if(ownedShips.includes(type)) {
                selectShip(type);
            } else {
                alert("Yetersiz Kredi!");
            }
        }
        function selectShip(type) {
            if(ownedShips.includes(type)) {
                currentShip = type;
                updateShopUI();
            }
        }
        function updateShopUI() {
            document.getElementById('ship-neon').className = currentShip === 'neon' ? 'item active-ship' : 'item';
            document.getElementById('ship-tank').className = currentShip === 'tank' ? 'item active-ship' : 'item';
            document.getElementById('creditDisplay').innerText = "KREDİ: " + credits;
        }

        // Klavyeden 'P' tuşu
        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'p') togglePause();
        });

        // OYUN DÖNGÜSÜ (Basitleştirilmiş başlangıç, önceki kodlarını buraya ekleyebilirsin)
        function gameLoop(ts) {
            if(!gameRunning || gamePaused) return;
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            
            // Buraya gemi çizimi, düşmanlar ve mermiler gelecek...
            
            document.getElementById('scoreDisplay').innerText = "SKOR: " + score;
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
