<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CYBERPUNK: FaTaCi GAMES MEGA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #0ff; height: 100vh; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; background: #050505; transition: background 2s; }
        canvas { width: 100%; height: 100%; display: block; }
        .ui { position: absolute; pointer-events: none; text-shadow: 0 0 10px #0ff; z-index: 10; }
        
        /* GİRİŞ EKRANI */
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; transition: 1s; cursor: pointer; }
        .glitch { font-size: 50px; animation: glitch-anim 0.3s infinite; text-shadow: 2px 2px #f0f; }
        @keyframes glitch-anim { 0% {transform:translate(0)} 50% {transform:translate(-3px, 2px)} 100% {transform:translate(3px, -2px)} }

        /* MENÜLER */
        .menu { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:100; pointer-events: auto; }
        .btn { padding: 12px 30px; border: 2px solid #0ff; background:transparent; color:#0ff; font-family:'Orbitron'; font-weight:bold; cursor:pointer; margin: 8px; width: 250px; transition: 0.3s; }
        .btn:hover { background:rgba(0,255,255,0.2); box-shadow: 0 0 15px #0ff; }
        
        /* MARKET */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px; max-width: 90vw; }
        .shop-item { border: 1px solid #f0f; padding: 10px; text-align: center; cursor: pointer; background: rgba(255,0,255,0.05); }
        .owned { border-color: #0f0; color: #0f0; }
        .selected { background: rgba(0,255,255,0.2); border: 2px solid #0ff; }

        .p-indicators { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .p-bar { width: 40px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 5px; opacity: 0; }
        .p-fill { height: 100%; width: 0%; transition: 0.1s linear; }

        /* BOMBA BUTONU (MOBİL İÇİN) */
        #bombBtn { position: absolute; bottom: 30px; right: 30px; width: 70px; height: 70px; border: 3px solid #ff0; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff0; font-weight: bold; pointer-events: auto; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="splash" onclick="startIntro()">
            <h1 class="glitch">FaTaCi GAMES</h1>
            <p style="color:#f0f; margin-top: 20px;">BAŞLATMAK İÇİN TIKLA</p>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div class="ui" style="top:20px; left:20px; display:flex; flex-direction:column; gap:5px;">
            <div id="sD">SKOR: 0</div>
            <div id="cD" style="color:#ff0">KREDİ: 0</div>
            <div id="lD" style="color:#0f0; font-size:12px;">LEVEL: 1</div>
            <div id="bD" style="color:#ff0; font-size:12px;">BOMBA (E): 0</div>
        </div>

        <div id="healthBar" class="ui" style="top:20px; right:20px; width:100px; height:12px; border:1px solid #f0f;">
            <div id="hF" style="width:100%; height:100%; background:#f0f; transition:0.3s;"></div>
        </div>

        <div id="bombBtn" onclick="useBomb()">BOMBA</div>

        <div id="mainMenu" class="menu">
            <h1 style="margin-bottom:20px;">NEON RUNNER V4</h1>
            <button class="btn" onclick="startGame()">GÖREVE BAŞLA</button>
            <button class="btn" onclick="showMenu('shopMenu')">SİBER MARKET</button>
            <div style="margin-top:20px; color:#ff0;">REKOR: <span id="bestS">0</span></div>
        </div>

        <div id="shopMenu" class="menu">
            <h1>SİBER MARKET</h1>
            <div class="shop-grid" id="shopGrid"></div>
            <button class="btn" onclick="showMenu('mainMenu')">ANA MENÜ</button>
        </div>

        <div id="overMenu" class="menu">
            <h1 style="color:#f00">GÖREV BAŞARISIZ</h1>
            <div id="finalScore" style="margin:20px;"></div>
            <button class="btn" onclick="location.reload()">TEKRAR DENE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false, score = 0, level = 1, lastTime = 0;
        let credits = parseInt(localStorage.getItem('fCredits')) || 0;
        let bestScore = parseInt(localStorage.getItem('fBest')) || 0;
        let ownedShips = JSON.parse(localStorage.getItem('fShips')) || ['neon'];
        let currentShipKey = localStorage.getItem('fCurrentShip') || 'neon';
        let bombCount = parseInt(localStorage.getItem('fBombs')) || 1;
        const keys = {};

        const sfx = {
            intro: new Audio('sesler/giris-efekti.mp3'),
            bgm: new Audio('sesler/muzik.mp3'),
            shoot: new Audio('sesler/ates.wav'),
            boom: new Audio('sesler/patlama.wav'),
            power: new Audio('sesler/ozel-guc.wav')
        };
        sfx.bgm.loop = true; sfx.bgm.volume = 0.15;

        const shipData = {
            neon: { name: "Neon Runner", cost: 0, speed: 10, health: 100, color: "#0ff" },
            tank: { name: "Titan Tank", cost: 5000, speed: 6, health: 250, color: "#f0f" },
            phantom: { name: "Shadow Phantom", cost: 12000, speed: 16, health: 70, color: "#ff0" }
        };

        const player = { x: 0, y: 0, h: 100, s: false, r: false, m: false, timers: {s:0, r:0, m:0}, lastS: 0 };
        let enemies = [], bullets = [], stars = [], powerups = [], shockwaves = [];
        
        const enemyTypes = { 
            drone: {c:'#ff0040', h:1, s:3.5, sc:10, sz:22}, 
            hunter: {c:'#ff6600', h:3, s:4.5, sc:30, sz:28}, 
            tank: {c:'#f0f', h:12, s:2.2, sc:70, sz:38}, 
            boss: {c:'#0ff', h:60, s:1.2, sc:600, sz:80} 
        };

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            player.x = canvas.width/2; player.y = canvas.height-100;
            stars = []; for(let i=0; i<80; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, sp:Math.random()*3+1});
        }
        window.addEventListener('resize', resize); resize();

        function startIntro() {
            try { sfx.intro.play(); } catch(e){}
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    showMenu('mainMenu');
                    document.getElementById('bestS').innerText = bestScore;
                }, 1000);
            }, 1500);
        }

        window.addEventListener('keydown', e => { 
            keys[e.key.toLowerCase()] = true; 
            if(e.key.toLowerCase()==='e') useBomb();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function showMenu(id) {
            document.querySelectorAll('.menu').forEach(m => m.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
            if(id === 'shopMenu') renderShop();
        }

        function renderShop() {
            const grid = document.getElementById('shopGrid');
            grid.innerHTML = '';
            for (let key in shipData) {
                const s = shipData[key];
                grid.innerHTML += `<div class="shop-item ${ownedShips.includes(key)?'owned':''} ${currentShipKey===key?'selected':''}" onclick="buyShip('${key}')">${s.name}<br>${ownedShips.includes(key)?'SEÇ':s.cost+' CR'}</div>`;
            }
            grid.innerHTML += `<div class="shop-item" onclick="buyBomb()">SİBER BOMBA<br>1000 CR</div>`;
            document.getElementById('cD').innerText = "KREDİ: " + credits;
        }

        function buyShip(key) {
            if(ownedShips.includes(key)) { currentShipKey = key; }
            else if(credits >= shipData[key].cost) { credits -= shipData[key].cost; ownedShips.push(key); currentShipKey = key; }
            localStorage.setItem('fCredits', credits); localStorage.setItem('fShips', JSON.stringify(ownedShips)); localStorage.setItem('fCurrentShip', key);
            renderShop();
        }

        function buyBomb() {
            if(credits >= 1000) { credits -= 1000; bombCount++; localStorage.setItem('fCredits', credits); localStorage.setItem('fBombs', bombCount); }
            renderShop();
        }

        function useBomb() {
            if(bombCount > 0 && gameRunning) {
                bombCount--; localStorage.setItem('fBombs', bombCount);
                shockwaves.push({x: player.x, y: player.y, r: 0});
                try { sfx.boom.cloneNode().play(); } catch(e){}
                enemies.forEach(en => { score += en.sc; credits += 5; });
                enemies = [];
            }
        }

        function startGame() {
            showMenu('none'); gameRunning = true; 
            player.h = shipData[currentShipKey].health;
            document.getElementById('bombBtn').style.display = 'flex';
            try { sfx.bgm.play(); } catch(e){}
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function shoot() {
            let now = Date.now(), rate = player.r ? 100 : 250;
            if(now - player.lastS < rate) return;
            try { let s = sfx.shoot.cloneNode(); s.volume = 0.1; s.play(); } catch(e){}
            if(player.m) {
                bullets.push({x:player.x, y:player.y-20, vx:0, vy:-12}, {x:player.x-15, y:player.y-10, vx:-3, vy:-11}, {x:player.x+15, y:player.y-10, vx:3, vy:-11});
            } else { bullets.push({x:player.x, y:player.y-20, vx:0, vy:-12}); }
            player.lastS = now;
        }

        function gameLoop(ts) {
            if(!gameRunning || gamePaused) return;
            let dt = (ts - lastTime) / 1000; if(dt > 0.1) dt = 0.016; lastTime = ts;

            // Seviye Bazlı Arka Plan Değişimi
            const bgVal = Math.min(score / 500, 40);
            document.getElementById('gameContainer').style.background = `rgb(5, ${bgVal/2}, ${bgVal})`;

            ctx.fillStyle = '#050505'; ctx.fillRect(0,0,canvas.width, canvas.height);
            stars.forEach(s => { s.y += s.sp; if(s.y > canvas.height) s.y = 0; ctx.fillStyle='#fff'; ctx.fillRect(s.x, s.y, s.s, s.s); });

            let ship = shipData[currentShipKey];
            if(keys['w']) player.y -= ship.speed; if(keys['s']) player.y += ship.speed;
            if(keys['a']) player.x -= ship.speed; if(keys['d']) player.x += ship.speed;
            if(keys[' ']) shoot();
            player.x = Math.max(20, Math.min(canvas.width-20, player.x));
            player.y = Math.max(20, Math.min(canvas.height-20, player.y));

            // Şok Dalgası Çizimi
            shockwaves.forEach((sw, i) => {
                sw.r += 20; ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${1 - sw.r/1000})`; ctx.lineWidth = 5; ctx.stroke();
                if(sw.r > 1000) shockwaves.splice(i,1);
            });

            // Gemi Çizimi
            if(player.s) { ctx.beginPath(); ctx.arc(player.x, player.y, 42, 0, Math.PI*2); ctx.strokeStyle='#0f0'; ctx.stroke(); }
            ctx.fillStyle = ship.color; ctx.beginPath(); ctx.moveTo(player.x, player.y-25); ctx.lineTo(player.x-20, player.y+15); ctx.lineTo(player.x+20, player.y+15); ctx.fill();

            bullets.forEach((b,i) => { b.x += b.vx; b.y += b.vy; ctx.fillStyle='#fff'; ctx.fillRect(b.x-2, b.y, 4, 12); if(b.y < -20) bullets.splice(i,1); });

            // Düşman Spawning
            if(Math.random() < 0.04 + (level * 0.005)) {
                let pool = ['drone']; if(level>=2) pool.push('hunter'); if(level>=3) pool.push('tank');
                let t = pool[Math.floor(Math.random()*pool.length)];
                if(score > 1500 && score % 2000 < 100 && !enemies.some(e=>e.t==='boss')) t = 'boss';
                let d = enemyTypes[t]; if(d) enemies.push({...d, x: Math.random()*(canvas.width-40)+20, y: -60, ch: d.h, maxH: d.h, t: t});
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let en = enemies[i]; en.y += en.s;
                ctx.save(); ctx.translate(en.x, en.y); ctx.fillStyle = en.c; ctx.beginPath();
                let sz = en.sz;
                if(en.t==='drone') { ctx.moveTo(0,-sz/2); ctx.lineTo(sz/2,sz/2); ctx.lineTo(-sz/2,sz/2); }
                else if(en.t==='hunter') ctx.rect(-sz/2, -sz/2, sz, sz);
                else { ctx.arc(0,0,sz/2, 0, Math.PI*2); }
                ctx.fill(); ctx.restore();

                if(Math.hypot(player.x-en.x, player.y-en.y) < sz/2+25) {
                    if(!player.s) player.h -= 25; enemies.splice(i,1);
                    document.getElementById('hF').style.width = (player.h/ship.health*100)+'%';
                    if(player.h <= 0) gameOver();
                }
                bullets.forEach((b, bi) => {
                    if(en && Math.hypot(b.x-en.x, b.y-en.y) < sz/2+10) {
                        en.ch--; bullets.splice(bi,1);
                        if(en.ch <= 0) {
                            try { sfx.boom.cloneNode().play(); } catch(e){}
                            score += en.sc; credits += Math.floor(en.sc/3);
                            if(Math.random() < 0.1) powerups.push({x:en.x, y:en.y, t:['s','r','m'][Math.floor(Math.random()*3)]});
                            if(score > level * 1000) level++; enemies.splice(i,1);
                        }
                    }
                });
            }

            document.getElementById('sD').innerText = "SKOR: " + score;
            document.getElementById('cD').innerText = "KREDİ: " + credits;
            document.getElementById('lD').innerText = "LEVEL: " + level;
            document.getElementById('bD').innerText = "BOMBA (E): " + bombCount;
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false; if(score > bestScore) localStorage.setItem('fBest', score);
            localStorage.setItem('fCredits', credits); showMenu('overMenu');
            document.getElementById('finalScore').innerText = "SKOR: " + score;
        }
    </script>
</body>
</html>
