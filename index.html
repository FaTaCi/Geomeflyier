<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON CYBERPUNK: FaTaCi GAMES V6</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: #0ff; height: 100vh; }
        
        #gameContainer { 
            position: relative; width: 100vw; height: 100vh; 
            background: #050505; transition: background 3s; 
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* GLOBAL COIN DISPLAY (Her Yerde Görünür) */
        .global-coin { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0,0,0,0.7); padding: 10px 20px; 
            border: 1px solid #ff0; border-radius: 20px;
            color: #ff0; font-weight: bold; z-index: 200;
            box-shadow: 0 0 10px rgba(255,255,0,0.3);
        }

        /* MENÜLER */
        .menu { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.95); display:none; flex-direction:column; 
            justify-content:center; align-items:center; z-index:100; pointer-events: auto;
        }
        #splash { position: fixed; background:#000; z-index:1000; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%; height:100%; cursor: pointer; }
        .glitch { font-size: 45px; animation: glitch 0.3s infinite; text-shadow: 2px 2px #f0f; }
        @keyframes glitch { 0% {transform:translate(0)} 50% {transform:translate(-2px, 2px)} 100% {transform:translate(2px, -2px)} }

        /* MARKET KATALOĞU (Gelişmiş) */
        .catalog-container {
            width: 90%; max-height: 70vh; overflow-y: auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; padding: 20px; border: 1px solid #333; background: rgba(10,10,10,0.8);
        }
        .item-card {
            border: 1px solid #444; padding: 15px; text-align: center;
            transition: 0.3s; cursor: pointer; position: relative;
        }
        .item-card:hover { border-color: #0ff; background: rgba(0,255,255,0.1); }
        .item-card.owned { border-color: #0f0; }
        .item-card.selected { border: 2px solid #0ff; box-shadow: 0 0 15px #0ff; }
        .price-tag { color: #ff0; font-size: 12px; margin-top: 8px; }

        .btn { padding: 12px 30px; border: 2px solid #0ff; background:transparent; color:#0ff; font-family:'Orbitron'; font-weight:bold; cursor:pointer; margin: 10px; }
        
        .game-ui { position: absolute; top: 20px; left: 20px; pointer-events: none; z-index: 50; }
        .health-box { width: 150px; height: 15px; border: 1px solid #f0f; margin-top: 5px; }
        #hFill { height: 100%; background: #f0f; width: 100%; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div class="global-coin" id="persistentCoin">🪙 0 CR</div>

        <div id="splash" onclick="startIntro()">
            <h1 class="glitch">FaTaCi GAMES</h1>
            <p style="color:#f0f; margin-top:20px;">SİSTEME GİRİŞ İÇİN TIKLA</p>
        </div>

        <div class="game-ui" id="gameUI" style="display:none;">
            <div id="scoreTxt">SKOR: 0</div>
            <div style="font-size:12px; color:#0f0;">LEVEL: <span id="lvlTxt">1</span></div>
            <div class="health-box"><div id="hFill"></div></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mainMenu" class="menu" style="display:flex;">
            <h1 style="color:#0ff; margin-bottom:20px;">SİBER KOMUTA</h1>
            <button class="btn" onclick="startGame()">GÖREVE BAŞLA</button>
            <button class="btn" onclick="showMenu('shopMenu')">SİYAH MARKET</button>
            <div style="margin-top:20px; color:#666;">REKOR: <span id="bestS">0</span></div>
        </div>

        <div id="shopMenu" class="menu">
            <h2 style="color:#ff0; margin-bottom:10px;">SİYAH MARKET</h2>
            <p style="font-size:10px; margin-bottom:15px;">YENİ GEMİLER VE MODÜLLER</p>
            <div class="catalog-container" id="catalogGrid"></div>
            <button class="btn" onclick="showMenu('mainMenu')">MENÜYE DÖN</button>
        </div>

        <div id="overMenu" class="menu">
            <h1 style="color:#f00">BAĞLANTI KOPARILDI</h1>
            <div id="finalScore" style="margin:20px; text-align:center;"></div>
            <button class="btn" onclick="location.reload()">SİSTEMİ RESETLE</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false, gamePaused = false, score = 0, level = 1, lastTime = 0;
        
        let credits = parseInt(localStorage.getItem('fCredits')) || 0;
        let bestScore = parseInt(localStorage.getItem('fBest')) || 0;
        let ownedItems = JSON.parse(localStorage.getItem('fOwned')) || ['neon'];
        let currentShip = localStorage.getItem('fCurrent') || 'neon';

        const sfx = {
            shoot: new Audio('sesler/ates.wav'),
            boom: new Audio('sesler/patlama.wav'),
            bgm: new Audio('sesler/muzik.mp3')
        };
        sfx.bgm.loop = true; sfx.bgm.volume = 0.2;

        // GENİŞ MARKET KATALOĞU
        const market = {
            neon: { name: "NEON", type: "ship", cost: 0, speed: 10, hp: 100, color: "#0ff" },
            tank: { name: "TITAN", type: "ship", cost: 5000, speed: 6, hp: 250, color: "#f0f" },
            phantom: { name: "GHOST", type: "ship", cost: 12000, speed: 15, hp: 80, color: "#ff0" },
            crimson: { name: "CRIMSON", type: "ship", cost: 18000, speed: 12, hp: 130, color: "#f00" },
            emerald: { name: "EMERALD", type: "ship", cost: 25000, speed: 9, hp: 180, color: "#0f0" },
            void: { name: "VOID", type: "ship", cost: 40000, speed: 11, hp: 300, color: "#fff" },
            gold: { name: "GOLDEN", type: "ship", cost: 75000, speed: 14, hp: 200, color: "#ffd700" }
        };

        const player = { x: 0, y: 0, h: 100, lastS: 0 };
        let enemies = [], bullets = [], stars = [];

        function resize() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            player.x = canvas.width/2; player.y = canvas.height-100;
            stars = []; for(let i=0; i<80; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, sp:Math.random()*3+1});
        }
        window.addEventListener('resize', resize); resize();

        function updateCreditsUI() {
            document.getElementById('persistentCoin').innerText = "🪙 " + credits + " CR";
        }

        function startIntro() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                updateCreditsUI();
                document.getElementById('bestS').innerText = bestScore;
            }, 500);
        }

        // ATEŞ ETME SİSTEMİ (PC ve MOBİL İÇİN KESİN ÇÖZÜM)
        function shoot() {
            if(!gameRunning || gamePaused) return;
            let now = Date.now();
            if(now - player.lastS < 200) return;
            const s = sfx.shoot.cloneNode(); s.volume = 0.1; s.play().catch(()=>{});
            bullets.push({x: player.x, y: player.y-25});
            player.lastS = now;
        }

        // PC Kontrolleri
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if(e.code === 'Space') shoot();
            if(e.key.toLowerCase() === 'p') togglePause();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        
        // Dokunmatik ve Mouse Ateş
        canvas.addEventListener('touchstart', e => { e.preventDefault(); shoot(); isT=true; tX=e.touches[0].clientX; tY=e.touches[0].clientY; });
        canvas.addEventListener('mousedown', e => { shoot(); });

        let isT = false, tX = 0, tY = 0;
        canvas.addEventListener('touchmove', e => {
            if(!isT || gamePaused) return; e.preventDefault();
            player.x += (e.touches[0].clientX - tX); player.y += (e.touches[0].clientY - tY);
            tX = e.touches[0].clientX; tY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchend', () => isT=false);

        function showMenu(id) {
            document.querySelectorAll('.menu').forEach(m => m.style.display = 'none');
            if(id !== 'none') document.getElementById(id).style.display = 'flex';
            if(id === 'shopMenu') renderShop();
            updateCreditsUI();
        }

        function renderShop() {
            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = '';
            for (let key in market) {
                const item = market[key];
                const isOwned = ownedItems.includes(key);
                const isSelected = currentShip === key;
                grid.innerHTML += `
                    <div class="item-card ${isOwned ? 'owned' : ''} ${isSelected ? 'selected' : ''}" onclick="buyItem('${key}')">
                        <div style="color:${item.color}; font-weight:bold;">${item.name}</div>
                        <div class="price-tag">${isOwned ? (isSelected ? 'AKTİF' : 'SEÇ') : item.cost + ' CR'}</div>
                    </div>
                `;
            }
        }

        function buyItem(key) {
            const item = market[key];
            if(ownedItems.includes(key)) {
                currentShip = key;
                localStorage.setItem('fCurrent', key);
            } else if(credits >= item.cost) {
                credits -= item.cost;
                ownedItems.push(key);
                currentShip = key;
                localStorage.setItem('fCredits', credits);
                localStorage.setItem('fOwned', JSON.stringify(ownedItems));
                localStorage.setItem('fCurrent', key);
            }
            renderShop();
            updateCreditsUI();
        }

        function startGame() {
            showMenu('none');
            document.getElementById('gameUI').style.display = 'block';
            gameRunning = true;
            player.h = market[currentShip].hp;
            document.getElementById('hFill').style.width = '100%';
            sfx.bgm.play().catch(()=>{});
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop(ts) {
            if(!gameRunning || gamePaused) return;
            let dt = (ts - lastTime) / 1000; if(dt > 0.1) dt = 0.016; lastTime = ts;

            // Arka Plan
            const col = Math.sin(Date.now()/3000)*15;
            document.getElementById('gameContainer').style.background = `radial-gradient(circle, rgb(5,${10+col},${20+col}) 0%, #000 100%)`;

            ctx.clearRect(0,0,canvas.width, canvas.height);
            stars.forEach(s => { s.y += s.sp; if(s.y > canvas.height) s.y = 0; ctx.fillStyle='#fff'; ctx.fillRect(s.x, s.y, s.s, s.s); });

            // Hareket
            let s = market[currentShip].speed;
            if(keys['w'] || keys['arrowup']) player.y -= s;
            if(keys['s'] || keys['arrowdown']) player.y += s;
            if(keys['a'] || keys['arrowleft']) player.x -= s;
            if(keys['d'] || keys['arrowright']) player.x += s;
            player.x = Math.max(20, Math.min(canvas.width-20, player.x));
            player.y = Math.max(20, Math.min(canvas.height-20, player.y));

            // Gemi Çizimi
            ctx.fillStyle = market[currentShip].color;
            ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath(); ctx.moveTo(player.x, player.y-25); ctx.lineTo(player.x-18, player.y+15); ctx.lineTo(player.x+18, player.y+15); ctx.fill();
            ctx.shadowBlur = 0;

            // Mermiler
            for(let i=bullets.length-1; i>=0; i--){
                bullets[i].y -= 12;
                ctx.fillStyle='#fff'; ctx.fillRect(bullets[i].x-2, bullets[i].y, 4, 15);
                if(bullets[i].y < -20) bullets.splice(i,1);
            }

            // Düşmanlar
            if(Math.random() < 0.04 + (level*0.005)){
                let tKeys = Object.keys(enemyTypes);
                let t = tKeys[Math.floor(Math.random()*(level > 3 ? 4 : 2))];
                let d = enemyTypes[t];
                enemies.push({...d, x: Math.random()*canvas.width, y:-50, ch: d.h, t: t});
            }

            for(let i=enemies.length-1; i>=0; i--){
                let en = enemies[i]; en.y += en.s;
                ctx.fillStyle = en.c;
                ctx.beginPath(); ctx.arc(en.x, en.y, en.sz/2, 0, Math.PI*2); ctx.fill();

                if(Math.hypot(player.x-en.x, player.y-en.y) < en.sz/2+20){
                    player.h -= 25; sfx.boom.cloneNode().play().catch(()=>{}); enemies.splice(i,1);
                    document.getElementById('hFill').style.width = (player.h/market[currentShip].hp*100)+'%';
                    if(player.h <= 0) { gameRunning=false; showMenu('overMenu'); document.getElementById('finalScore').innerText = "SKOR: "+score; if(score>bestScore) localStorage.setItem('fBest', score); localStorage.setItem('fCredits', credits); }
                }

                bullets.forEach((b, bi) => {
                    if(Math.hypot(b.x-en.x, b.y-en.y) < en.sz/2+10){
                        en.ch--; bullets.splice(bi,1);
                        if(en.ch <= 0){
                            score += en.sc; credits += Math.floor(en.sc/4);
                            sfx.boom.cloneNode().play().catch(()=>{});
                            enemies.splice(i,1);
                            if(score > level*1000) level++;
                        }
                    }
                });
                if(en.y > canvas.height+50) enemies.splice(i,1);
            }

            document.getElementById('scoreTxt').innerText = "SKOR: " + score;
            document.getElementById('lvlTxt').innerText = level;
            updateCreditsUI();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
